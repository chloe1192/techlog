{% extends "base.html" %}
{% block title %}Techlog - {{ page_title }}Techlog{% endblock %}
{% load static %}

{% block content %}

<div class="dashboard">
    <div class="container-fluid">
        
        <div class="section-container">
            <div class="section-header">
                <i class="bi bi-building"></i>Operators
            </div>

            <div class="row gap-md">
                {% for operator in operators %}
                    <div class="col-lg-4 col-md-6 col-sm-12">
                        <div class="card">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h5 class="card-title mb-0">{{ operator.name }}</h5>
                                        <small class="text-muted">Operator</small>
                                    </div>
                                    <a href="operator/{{ operator.id }}" class="btn btn-sm btn-primary">
                                        <i class="bi bi-pencil"></i> Manage
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>

    </div>
</div>

{% endblock %}
