{% extends "base.html" %}
{% block title %}Techlog - {{ page_title }}{{ page_title }}{% endblock %}
{% include "header.html" %}

{% block content %}
<div class="dashboard">

    <div class="row mt-3">

        <div class="col-md-3">
            <a class="card 
                {% if dep_fluids_status.fuel %}
                    bg-success
                {% else %}
                    bg-danger
                {% endif %}                
                text-light" href="{% url 'flight_departure_fluids' current_airframe.id 0 %}" class="text-decoration-none w-100">
                <div class="card-body">
                    <h4 class="card-title">
                        <i class="bi bi-fuel-pump"></i>
                        <br>
                        Departure Fuel
                    </h4>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a class="card 
                {% if dep_fluids_status.oil %}
                    bg-success
                {% else %}
                    bg-danger
                {% endif %}                
                text-light" href="{% url 'flight_departure_fluids' current_airframe.id 1 %}" class="text-decoration-none w-100">
                <div class="card-body">
                    <h4 class="card-title">
                        <i class="bi bi-droplet"></i>
                        <br>
                        Departure Oil
                    </h4>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a class="card 
                {% if dep_fluids_status.hyd %}
                    bg-success
                {% else %}
                    bg-danger
                {% endif %}                
                text-light" href="{% url 'flight_departure_fluids' current_airframe.id 2 %}" class="text-decoration-none w-100">
                <div class="card-body">
                    <h4 class="card-title">
                        <i class="bi bi-gear-fill"></i>
                        <br>
                        Departure Hyd
                    </h4>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a class="card 
                {% if dep_fluids_status.water %}
                    bg-success
                {% else %}
                    bg-danger
                {% endif %}                
                text-light" href="{% url 'flight_departure_fluids' current_airframe.id 3 %}" class="text-decoration-none w-100">
                <div class="card-body">
                    <h4 class="card-title">
                        <i class="bi bi-water"></i>
                        <br>
                        Departure Water
                    </h4>
                </div>
            </a>
        </div>

    </div>

</div>

{% endblock %}
