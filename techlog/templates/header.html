<header>
    <div class="container-fluid">
        <div class="row align-items-center">
            <div class="col-lg-3 col-md-4 col-sm-12 mb-2 mb-md-0">
                <div class="d-flex align-items-center gap-2">
                    <span class="return-arrow">
                        <a href="{{ return_url }}">
                            <i class="bi bi-arrow-left"></i>
                        </a>
                    </span>
                    <div class="Title">{{ page_title }}</div>
                </div>
            </div>
            
            <div class="col-lg-9 col-md-8 col-sm-12">
                <div class="row gap-2">
                    <div class="col-auto">
                        <div class="crew-notice-box box box-green">
                            Crew Notice <span>1</span>
                        </div>
                    </div>
                    <div class="col-auto">
                        <div class="crew-notice-box box box-green">
                            Limitations <span>2</span>
                        </div>
                    </div>
                    {% if current_operator.id %}
                    <div class="col-auto">
                        <a href="{% url 'operator_index' current_operator.id %}" class="airframe-info-box box box-green text-decoration-none">
                            <div class="registration">{{ current_airframe.registration }}</div>
                            <div class="aircraft-type">{{ current_airframe.aircraft_type.icao_code }}</div>
                            <div class="airframe-fin-number">MSN {{ current_airframe.msn }}</div>
                        </a>
                    </div>
                    {% endif %}
                    <div class="col-auto">
                        <div id="syncButton" class="sync-box box box-green">
                            <i class="bi bi-arrow-repeat"></i>
                            <span>Last Sync: {{ last_sync }}</span>
                        </div>
                    </div>
                    <div class="col-auto">
                        <div class="battery-box box box-green">
                            <i class="bi bi-battery"></i>
                            <span>100%</span>
                        </div>
                    </div>
                    <div class="col-auto">
                        <div class="connection-box box box-green">
                            <i class="bi bi-wifi"></i>
                            <span>Internet/Acars</span>
                        </div>
                    </div>
                    <div class="col-auto">
                        <div class="corrections-box box box-green">
                            Corrections <span>0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
